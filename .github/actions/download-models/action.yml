name: 'Download Models'
description: 'Download models from different sources'

inputs:
  compiler-type:
    description: 'PLUGIN|DRIVER'
    type: string
    required: true
  models-config:
    description: 'Path to a JSON configuration file describing models to validate'
    type: string
    required: true
  models-dir:
    description: 'Path to a directory where to save models'
    type: string
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup python version
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.14'

    - name: Install dependencies
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --require-hashes -r ${{ github.action_path }}/requirements.txt

    - name: Run downloader script
      shell: bash
      run: |
        python3 ${{ github.action_path }}/download_models.py \
          --compiler-type "${{ inputs.compiler-type }}" \
          --models-config "${{ inputs.models-config }}" \
          --models-dir "${{ inputs.models-dir }}"
