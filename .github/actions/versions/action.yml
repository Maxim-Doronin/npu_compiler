name: Versions
description: Parse git versions from config files

outputs:
  openvino-repository:
    description: 'OpenVINO Repository full name: fork/openvino'
    value: ${{ steps.read-openvino-sha.outputs.openvino-repository }}
  openvino-sha:
    description: 'OpenVINO commit SHA'
    value: ${{ steps.read-openvino-sha.outputs.openvino-sha }}
  npu-compiler-repository:
    description: 'NPU Compiler Repository full name: fork/npu_compiler'
    value: ${{ steps.get-npu-sha.outputs.npu-compiler-repository }}
  npu-compiler-sha:
    description: 'NPU Compiler commit SHA'
    value: ${{ steps.get-npu-sha.outputs.npu-compiler-sha }}
  npu-compiler-tag:
    description: 'NPU Compiler custom tag to be used in the packages build'
    value: ${{ steps.create-npu-tag.outputs.npu-compiler-tag }}
  npu-compiler-version:
    description: 'NPU Compiler version parsed from the changelog'
    value: ${{ steps.read-npu-version.outputs.npu-compiler-version }}
  npu-linux-driver-repository:
    description: 'NPU Linux Driver Repository full name: fork/linux-npu-driver'
    value: ${{ steps.read-linux-npu-driver-sha.outputs.drv-repository }}
  npu-linux-driver-sha:
    description: 'NPU Linux Driver commit SHA'
    value: ${{ steps.read-linux-npu-driver-sha.outputs.drv-sha }}
  omz-repository:
    description: 'Open Model Zoo Repository full name: fork/open_model_zoo'
    value: ${{ steps.read-omz-sha.outputs.omz-repository }}
  omz-sha:
    description: 'Open Model Zoo commit SHA'
    value: ${{ steps.read-omz-sha.outputs.omz-sha }}
  opencv-repository:
    description: 'OpenCV Repository full name: fork/opencv'
    value: ${{ steps.read-ocv-sha.outputs.ocv-repository }}
  opencv-sha:
    description: 'OpenCV commit SHA'
    value: ${{ steps.read-ocv-sha.outputs.ocv-sha }}

runs:
  using: 'composite'
  steps:
    - name: Get NPU original fork and commit sha
      id: get-npu-sha
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          NPU_REPO=${{ github.event.pull_request.head.repo.full_name }}
          NPU_SHA=${{ github.event.pull_request.head.sha }}
        else
          NPU_REPO=${{ github.repository }}
          NPU_SHA=${{ github.sha }}
        fi

        echo "NPU Compiler repository = $NPU_REPO"
        echo "NPU Compiler commit sha = $NPU_SHA"
        echo "npu-compiler-repository=$NPU_REPO" >> $GITHUB_OUTPUT
        echo "npu-compiler-sha=$NPU_SHA" >> $GITHUB_OUTPUT

    - name: Get NPU tag
      id: create-npu-tag
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        NPU_REPO: ${{ steps.get-npu-sha.outputs.npu-compiler-repository }}
        NPU_SHA:  ${{ steps.get-npu-sha.outputs.npu-compiler-sha }}
      run: |
        NPU_TAG=""
        if JSON=$(gh api --paginate "repos/$NPU_REPO/tags?per_page=100" 2>/dev/null); then
          NPU_TAG=$(printf '%s' "$JSON" | jq -r --arg sha "$NPU_SHA" '
            .[] | select(.commit.sha == $sha) | .name
          ' | head -n1)
        fi

        if [[ -z "${NPU_TAG}" ]]; then
          echo "No tag found associated with the current commit, temporary tag will be used."
          NPU_TAG="ci_${NPU_SHA:0:7}"
        fi

        echo "NPU Compiler tag to be used in NPU builds : $NPU_TAG"
        echo "npu-compiler-tag=${NPU_TAG}" >> $GITHUB_OUTPUT

    - name: Fetch and parse NPU Compiler version from the changelog file
      id: read-npu-version
      shell: bash
      run: |
        NPU_REPO=${{ steps.get-npu-sha.outputs.npu-compiler-repository }}
        NPU_SHA=${{ steps.get-npu-sha.outputs.npu-compiler-sha }}
        CHANGELOG=$(curl -sS --fail --retry 5 --retry-delay 2 \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${NPU_REPO}/contents/src/vpux_driver_compiler/CHANGES.txt?ref=${NPU_SHA} \
        )
        compiler_version="$(
          printf '%s\n' "$CHANGELOG" | awk '
            /^[[:space:]]*VPUXCompilerL0[[:space:]]+([0-9]+\.){2}[0-9]+[[:space:]]*:/ {
              line=$0
              sub(/^[[:space:]]*VPUXCompilerL0[[:space:]]+/, "", line)
              sub(/[[:space:]]*:.*$/, "", line)
              print line
              exit
            }'
        )"

        if [[ -z "${compiler_version}" ]]; then
          echo "Coould not find: 'VPUXCompilerL0 X.Y.Z:' pattern"; exit 1
        fi

        compiler_version_under_score="${compiler_version//./_}"

        echo "NPU Compiler version = $compiler_version_under_score"
        echo "npu-compiler-version=$compiler_version_under_score" >> $GITHUB_OUTPUT

    - name: Fetch and parse OpenVINO config from NPU Compiler
      id: read-openvino-sha
      shell: bash
      run: |
        NPU_REPO=${{ steps.get-npu-sha.outputs.npu-compiler-repository }}
        NPU_SHA=${{ steps.get-npu-sha.outputs.npu-compiler-sha }}
        JSON=$(curl -sS --fail --retry 5 --retry-delay 2 \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${NPU_REPO}/contents/validation/openvino_config.json?ref=${NPU_SHA} \
        )
        OV_ORG=$(echo "$JSON" | jq -r 'to_entries[0].key')
        OV_SHA=$(echo "$JSON" | jq -r 'to_entries[0].value')
        echo "OpenVINO orgranization = $OV_ORG"
        echo "OpenVINO commit sha = $OV_SHA"
        echo "openvino-repository=$OV_ORG/openvino" >> $GITHUB_OUTPUT
        echo "openvino-sha=$OV_SHA" >> $GITHUB_OUTPUT

    - name: Fetch and parse Linux NPU Driver config from NPU Compiler
      id: read-linux-npu-driver-sha
      shell: bash
      run: |
        NPU_REPO=${{ steps.get-npu-sha.outputs.npu-compiler-repository }}
        NPU_SHA=${{ steps.get-npu-sha.outputs.npu-compiler-sha }}
        JSON=$(curl -sS --fail --retry 5 --retry-delay 2 \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${NPU_REPO}/contents/validation/linux_npu_driver_config.json?ref=${NPU_SHA} \
        )
        DRV_ORG=$(echo "$JSON" | jq -r 'to_entries[0].key')
        DRV_SHA=$(echo "$JSON" | jq -r 'to_entries[0].value')
        echo "Linux NPU Driver orgranization = $DRV_ORG"
        echo "Linux NPU Driver commit sha = $DRV_SHA"
        echo "drv-repository=$DRV_ORG/linux-npu-driver" >> $GITHUB_OUTPUT
        echo "drv-sha=$DRV_SHA" >> $GITHUB_OUTPUT

    - name: Fetch and parse OMZ config from OpenVINO
      id: read-omz-sha
      shell: bash
      run: |
        OV_REPO=${{ steps.read-openvino-sha.outputs.openvino-repository }}
        OV_SHA=${{ steps.read-openvino-sha.outputs.openvino-sha }}
        JSON=$(curl -sS --fail --retry 5 --retry-delay 2 \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${OV_REPO}/contents/src/plugins/intel_npu/tools/omz_version.json?ref=${OV_SHA} \
        )
        OMZ_ORG=$(echo "$JSON" | jq -r 'to_entries[0].key')
        OMZ_SHA=$(echo "$JSON" | jq -r 'to_entries[0].value')
        echo "Open Model Zoo orgranization = $OMZ_ORG"
        echo "Open Model Zoo commit sha = $OMZ_SHA"
        echo "omz-repository=$OMZ_ORG/open_model_zoo" >> $GITHUB_OUTPUT
        echo "omz-sha=$OMZ_SHA" >> $GITHUB_OUTPUT

    - name: Fetch and parse OpenCV config from OpenVINO
      id: read-ocv-sha
      shell: bash
      run: |
        OV_REPO=${{ steps.read-openvino-sha.outputs.openvino-repository }}
        OV_SHA=${{ steps.read-openvino-sha.outputs.openvino-sha }}
        JSON=$(curl -sS --fail --retry 5 --retry-delay 2 \
          -H "Accept: application/vnd.github.v3.raw" \
          https://api.github.com/repos/${OV_REPO}/contents/src/plugins/intel_npu/tools/opencv_version.json?ref=${OV_SHA} \
        )
        OCV_ORG=$(echo "$JSON" | jq -r 'to_entries[0].key')
        OCV_SHA=$(echo "$JSON" | jq -r 'to_entries[0].value')
        echo "OpenCV orgranization = $OCV_ORG"
        echo "OpenCV commit sha = $OCV_SHA"
        echo "ocv-repository=$OCV_ORG/opencv" >> $GITHUB_OUTPUT
        echo "ocv-sha=$OCV_SHA" >> $GITHUB_OUTPUT
