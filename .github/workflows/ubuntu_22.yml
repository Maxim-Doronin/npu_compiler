name: Linux (Ubuntu 22.04)
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop

concurrency:
  group: linux-${{ github.event_name }}-${{ github.ref_name }}-ubuntu_22_04
  cancel-in-progress: true

permissions: read-all

jobs:
  Ubuntu2204:
    name: Main Trigger
    uses: ./.github/workflows/job_linux.yml
    with:
      os: ubuntu_22_04
      build-runner: ubuntu-22.04-16-cores
      test-runner: ubuntu-22.04-8-cores
      build-cache: false
      build-cache-key-suffix: cache_${{ github.ref_name }}
      build-mlir: false
      build-driver: false
      run-unit-tests: true
      run-lit-tests: true
      run-compilation-tests: true
