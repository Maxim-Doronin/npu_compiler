name: Linux (Ubuntu 22.04)
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop

concurrency:
  group: linux-${{ github.event_name }}-${{ github.ref_name }}-ubuntu_22_04
  cancel-in-progress: true

permissions: read-all

jobs:
  Ubuntu2204:
    name: Main Trigger
    uses: ./.github/workflows/job_linux.yml
    permissions:
      actions: read
      contents: read
      packages: read
      statuses: read
      security-events: write
      id-token: write
      attestations: write
    with:
      os: ubuntu_22_04
      build-runner: ubuntu-22.04-16-cores
      test-runner: ubuntu-22.04-8-cores
      build-cache: true
      build-cache-key-suffix: ${{ github.sha }}
      build-plugin: true
      build-driver: true
      build-cid: true
      run-unit-tests: true
      run-lit-tests: true
      run-compilation-tests: true
