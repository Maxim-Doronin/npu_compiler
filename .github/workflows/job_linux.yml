name: Linux pipeline
on:
  workflow_call:
    inputs:
      os:
        description: 'OS that is used for building in the form of "ubuntu_20_04"'
        type: string
        required: true
      build-runner:
        description: 'Machine on which the builds will run'
        type: string
        required: true
      test-runner:
        description: 'Machine on which the tests will run'
        type: string
        required: false
      openvino-cmake-options:
        description: 'A string of options passed to OpenVINO CMake'
        type: string
        required: false
      npu-cmake-options:
        description: 'A string of options passed to NPU Compiler CMake'
        type: string
        required: false
      driver-cmake-options:
        description: 'A string of options passed to NPU Driver CMake'
        type: string
        required: false
      build-plugin:
        description: 'Whether to build Plugin NPU Compiler'
        type: boolean
        required: false
        default: true
      build-driver:
        description: 'Whether to build NPU Driver with Compiler'
        type: boolean
        required: false
        default: true
      build-cid:
        description: 'Whether to build NPU CiD component'
        type: boolean
        required: false
        default: false
      build-cache:
        description: 'Whether to take previously built OpenVINO/NPU package.'
        type: boolean
        required: false
        default: false
      build-cache-key-suffix:
        description: 'Cache package suffix'
        type: string
        required: false
      with-codeql:
        description: 'Whether to run CodeQL static C/C++ analyzer'
        type: boolean
        required: false
        default: false
      run-unit-tests:
        description: 'Whether to run NPU Compiler unit tests'
        type: boolean
        required: false
        default: false
      run-lit-tests:
        description: 'Whether to run NPU Compiler LIT tests'
        type: boolean
        required: false
        default: false
      run-compilation-tests:
        description: 'Whether to run NPU Compiler compile_tool tests suites'
        type: boolean
        required: false
        default: false

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: read
  packages: read
  statuses: read

env:
  OPENVINO_INSTALL_DIR: ./openvino_install

jobs:
  BuildPlugin:
    name: Plugin / Build
    if: ${{ inputs.build-plugin }}
    uses: ./.github/workflows/job_build_plugin_linux.yml
    permissions:
      actions: read
      contents: read
      packages: read
      statuses: read
      security-events: write
    with:
      os: ${{ inputs.os }}
      build-runner: ${{ inputs.build-runner }}
      openvino-cmake-options: ${{ inputs.openvino-cmake-options }}
      npu-cmake-options: ${{ inputs.npu-cmake-options }}
      build-cache: ${{ inputs.build-cache }}
      build-cache-key-suffix: ${{ inputs.build-cache-key-suffix }}
      with-codeql: ${{ inputs.with-codeql }}
      with-tests: ${{ inputs.run-unit-tests || inputs.run-lit-tests }}

  BuildDriver:
    name: Driver / Build
    if: ${{ inputs.build-driver }}
    uses: ./.github/workflows/job_build_drv_linux.yml
    with:
      os: ${{ inputs.os }}
      build-runner: ${{ inputs.build-runner }}
      driver-cmake-options: ${{ inputs.driver-cmake-options }}
      build-cache: ${{ inputs.build-cache }}
      build-cache-key-suffix: ${{ inputs.build-cache-key-suffix }}

  BuildCiD:
    name: CiD / Build
    if: ${{ inputs.build-cid }}
    uses: ./.github/workflows/job_build_cid.yml
    permissions:
      actions: read
      contents: read
      packages: read
      statuses: read
      id-token: write
      attestations: write
    with:
      os: ${{ inputs.os }}
      build-runner: ${{ inputs.build-runner }}
      openvino-cmake-options: ${{ inputs.openvino-cmake-options }}
      build-cache: ${{ inputs.build-cache }}
      build-cache-key-suffix: ${{ inputs.build-cache-key-suffix }}

  PluginUnitTests:
    name: Plugin / Unit Tests
    needs: BuildPlugin
    if: ${{ inputs.run-unit-tests || inputs.run-lit-tests }}
    uses: ./.github/workflows/job_tests_unit_plugin_linux.yml
    with:
      test-runner: ${{ inputs.test-runner }}
      install-package-openvino: ${{ needs.BuildPlugin.outputs.build-package }}
      run-unit-tests: ${{ inputs.run-unit-tests }}
      run-lit-tests: ${{ inputs.run-lit-tests }}

  PluginCompilationTests:
    name: Plugin / Compilation Tests
    needs: BuildPlugin
    if: ${{ inputs.run-compilation-tests }}
    uses: ./.github/workflows/job_tests_compilation_linux.yml
    with:
      os: ${{ inputs.os }}
      test-runner: ${{ inputs.test-runner }}
      install-package-openvino: ${{ needs.BuildPlugin.outputs.build-package }}
      compiler-type: PLUGIN

  DriverCompilationTests:
    name: Driver / Compilation Tests
    needs: [BuildDriver, BuildPlugin]
    if: ${{ inputs.run-compilation-tests }}
    uses: ./.github/workflows/job_tests_compilation_linux.yml
    with:
      os: ${{ inputs.os }}
      test-runner: ${{ inputs.test-runner }}
      install-package-openvino: ${{ needs.BuildPlugin.outputs.build-package }}
      install-package-driver: ${{ needs.BuildDriver.outputs.build-package }}
      compiler-type: DRIVER
