name: Linux (Ubuntu 24.04)
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - develop
      - releases/**

concurrency:
  group: linux-${{ github.event_name }}-${{ github.ref_name }}-ubuntu_24_04
  cancel-in-progress: true

permissions: read-all

jobs:
  Ubuntu2404:
    name: Main Trigger
    uses: ./.github/workflows/job_linux.yml
    permissions:
      actions: read
      contents: read
      packages: read
      statuses: read
      security-events: write
      id-token: write
      attestations: write
    with:
      os: ubuntu_24_04
      build-runner: ubuntu-latest-32-cores
      test-runner: ubuntu-latest-8-cores
      build-cache: true
      build-cache-key-suffix: ${{ github.sha }}
      build-plugin: true
      build-driver: false
      build-cid: true
      run-unit-tests: true
      run-lit-tests: true
      run-compilation-tests: true
