name: Linux Compilation Tests
on:
  workflow_call:
    inputs:
      test-runner:
        description: 'Machine on which the tests will run'
        type: string
        required: true
      install-package:
        description: 'Artifacts name from the build stage. Content varies depending on compiler-type'
        type: string
        required: true
      compiler-type:
        description: 'MLIR or DRIVER'
        type: string
        required: true

defaults:
  run:
    shell: bash

permissions: read-all

jobs:
  CompilationTests:
    name: Compilation tests
    runs-on: ${{ inputs.test-runner }}
    timeout-minutes: 60
    env:
      INSTALL_PACKAGE_DIR: ./install_package
      MODELS_DIR: ./models
    strategy:
      matrix:
        include:
          - npu-platform: NPU.3720
            models-config: ./validation/public_models_3720.json
          - npu-platform: NPU.4000
            models-config: ./validation/public_models_4000.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.install-package }}
          path: ${{ env.INSTALL_PACKAGE_DIR }}

      - name: Unpack Driver artifacts
        if: ${{ inputs.compiler-type == 'DRIVER' }}
        run: |
          cd ${INSTALL_PACKAGE_DIR}
          dpkg --extract external/intel-driver-compiler-npu_*.deb .
          dpkg --extract external/intel-level-zero-npu_*.deb .
          dpkg --extract internal/intel-level-zero_*.deb .
          dpkg --extract internal/intel-openvino-npu_*.deb .
          find . -type f

      - name: Install system packages
        if: ${{ inputs.compiler-type == 'DRIVER' }}
        run: |
          sudo apt update
          sudo apt install -y libtbb12

      - name: Download models for ${{ matrix.npu-platform }}
        uses: ./.github/actions/download-models
        with:
          compiler-type: ${{ inputs.compiler-type }}
          models-config: ${{ matrix.models-config }}
          models-dir: ${{ env.MODELS_DIR }}

      - name: Compile models for ${{ matrix.npu-platform }}
        uses: ./.github/actions/compile-models
        with:
          compiler-type: ${{ inputs.compiler-type }}
          npu-platform: ${{ matrix.npu-platform }}
          install-package-dir: ${{ env.INSTALL_PACKAGE_DIR }}
          models-dir: ${{ env.MODELS_DIR }}
          models-config: ${{ matrix.models-config }}
